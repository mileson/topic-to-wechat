# news-minimal: 极简新闻风格
# 浅色调 + 简洁排版 + 无渐变

colors:
  primary: "#1a202c"
  secondary: "#2d3748"
  accent: "#3182ce"
  text: "#1a202c"
  text_secondary: "#718096"
  bg_code: "#2d3748"
  bg_code_inline: "#edf2f7"
  bg_blockquote: "#f7fafc"
  link: "#3182ce"
  bold_highlight: "#bee3f8"
  headings:
    - "#1a202c"
    - "#2d3748"
    - "#4a5568"

typography:
  font_size: 15
  line_height: 1.8
  letter_spacing: 0.2

code_style: "github-dark"

section_icons:
  - "•"
  - "•"
  - "•"
  - "•"
  - "•"
  - "•"
  - "•"
  - "•"
  - "•"
  - "•"

header:
  style: "card"
  icon: "📰"
  show_date: true
  highlight_color: "#3182ce"
  category_color: "#1a202c"
  border_color: "#e2e8f0"
  default_category: ""
  gradient_start: "#1a202c"
  gradient_end: "#2d3748"

footer:
  enabled: true
  text: ""
