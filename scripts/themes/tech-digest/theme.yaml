# tech-digest: 技术简报风格
# 白底卡片标题 + 分类标签 + 编号分区 + 深色代码块 + 高亮强调

colors:
  primary: "#667eea"
  secondary: "#764ba2"
  accent: "#e53e3e"
  text: "#2d3748"
  text_secondary: "#718096"
  bg_code: "#1a1a2e"
  bg_code_inline: "#edf2f7"
  bg_blockquote: "#f7fafc"
  link: "#667eea"
  bold_highlight: "#fef3c7"
  headings:
    - "#667eea"
    - "#e53e3e"
    - "#38a169"
    - "#d69e2e"
    - "#3182ce"
    - "#805ad5"
    - "#dd6b20"
    - "#319795"

typography:
  font_size: 15
  line_height: 1.85
  letter_spacing: 0.3

code_style: "monokai"

section_icons:
  - "1️⃣"
  - "2️⃣"
  - "3️⃣"
  - "4️⃣"
  - "5️⃣"
  - "6️⃣"
  - "7️⃣"
  - "8️⃣"
  - "9️⃣"
  - "🔟"

header:
  # style: "card"（白底卡片，编辑感）或 "gradient"（渐变色满铺）
  style: "card"
  icon: "🚀"
  show_date: true
  # card 模式专属
  highlight_color: "#e53e3e"
  category_color: "#667eea"
  border_color: "#e2e8f0"
  default_category: ""
  # gradient 模式专属（切换为 gradient 时生效）
  gradient_start: "#667eea"
  gradient_end: "#764ba2"

footer:
  enabled: false
  text: ""
